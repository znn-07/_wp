<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介 - 你的名字</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #4a90e2;
            --bg: #f0f2f5;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .banner {
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .content {
            padding: 0 30px 30px;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            margin-top: -50px;
            border: 5px solid #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 15px 0 5px; color: var(--primary); }
        .school-info { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
        
        .info-list {
            text-align: left;
            margin: 20px 0;
            border-top: 1px dashed #eee;
            padding-top: 20px;
        }
        .info-item {
            display: flex;
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        .label { width: 80px; color: #95a5a6; font-weight: bold; }
        .value { color: var(--primary); flex: 1; }

        .interests {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }
        .interest-tag {
            background: #f1f3f5;
            color: #555;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .btn {
            display: block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            margin-top: 25px;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn:hover { background: #357abd; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <div class="banner"></div>
    <div class="content">
        <div class="profile-img">👤</div>
        <h1>劉甄娜</h1>
        <div class="school-info">國立金門大學 | 資訊工程學系</div>

        <div class="info-list">
            <div class="info-item">
                <div class="label">學號</div>
                <div class="value"111410510</div>
            </div>
            <div class="info-item">
                <div class="label">電話</div>
                <div class="value">0903-865-523</div>
            </div>
        </div>

        <div style="font-size: 0.9em; color: #95a5a6; font-weight: bold; text-align: left;">個人興趣</div>
        <div class="interests">
            <span class="interest-tag">看棒球</span>
            <span class="interest-tag">看排球</span>
            <span class="interest-tag">看籃球</span>
            <span class="interest-tag">看賽車</span>
        </div>

        <a href="https://yourwebsite.com" class="btn" target="_blank">造訪我的個人網站</a>
    </div>
</div>

</body>
</html>
